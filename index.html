<!DOCTYPE html>
<html lang="fr">

<!------------------------------------------------------------------->
<!------------------------------------------------------------------->

<head>
  <meta charset="UTF-8">
  <title>Prévisionnel Réception Ad'hoc</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<!------------------------------------------------------------------->
<!------------------------------------------------------------------->

<body>

<!---------------------------------------------------------------------->
<!------------------------------Titre page------------------------------>
<!---------------------------------------------------------------------->

<div id="header">
  <img src="logo.png" alt="Logo" id="logo">
  <h1>Prévisionnel Réception Ad'hoc</h1>
</div>

<div id="secondeLigne"></div>

<!------------------------------------------------------------------------------>
<!--------------------------------CONTENU GLOBAL-------------------------------->
<!------------------------------------------------------------------------------>

<div id = "contenu">


  
  <!---------------------------------------------------------------------->
  <!---------------------------Ligne rechercher--------------------------->
  <!---------------------------------------------------------------------->
  
  <div id ="ligneRecherche">
      <p>Rechercher :</p>
      <div id="RechEB">
          <label>
          EB
          <input type="text" id="inputEB" list="EBList" autocomplete="off">
          <datalist id="EBList"></datalist>
          </label>
      </div>
      <div id="RechLEB">
          <label>
          N° LEB
          <input type="text" id="inputLEB" list="LEBList" autocomplete="off">
          <datalist id="LEBList"></datalist>
          </label>
      </div>
      <div id="RechStatut">
          <label>
          Statut
          <input type="text" id="inputStatut" list="StatutList" autocomplete="off">
          <datalist id="StatutList"></datalist>
          </label>
          
          <label>
          <input type="checkbox" id="checkCloturees">
          Afficher les LEB clôturées
          </label>
          
      </div>
      <div id="RechCriticite">
          <label>
          Criticité 
          <input type="text" id="inputCriticite" list="CriticiteList" autocomplete="off">
          <datalist id="CriticiteList"></datalist>
          </label>
      </div>
      <div id="RechValideur">
          <label>
          Valideur
          <input type="text" id="inputValideur" list="ValideurList" autocomplete="off">
          <datalist id="ValideurList"></datalist>
          </label>
      </div>
      
      <div id="RechPON">
          <label>
          N° UFN
          <input type="text" id="inputPON" list="PONList" autocomplete="off">
          <datalist id="PONList"></datalist>
          </label>
      </div>
      <div id="RechFournisseur">
          <label>
          Fournisseur
          <input type="text" id="inputFournisseur" list="FournisseurList" autocomplete="off">
          <datalist id="FournisseurList"></datalist>
          </label>
      </div>
      
      <div id="RechSemaine">
          <label>
          Semaine livraison
          <input type="text" id="inputSemaine" list="SemaineList" autocomplete="off">
          <datalist id="SemaineList"></datalist>
          </label>
      </div>
      <input type="button" id="btnValider" value="Valider">      
      <input type="button" id="btnEffacer" value="Effacer">
      
      
  </div>
  
  <!--------------------------------------------------------------------->
  <!----------------------------Ligne Tableau---------------------------->
  <!--------------------------------------------------------------------->
  <div id="tableauWrapper">
  <table id="Tableau" border="1" >
      <thead>
        <tr>
          <th>EB</th>
          <th>Nb LEB cloturées dans EB</th>
          <th>N° LEB</th>
          <th>Statut</th>
          <th>Criticité</th>
          <th>Demandeur</th>
          <th>Lieu de livraison</th>
          <th>Livraison partielle</th>
          <th>Quantité</th>
          <th>N° UFN</th>
          <th>Fournisseur</th>
          <th>Délai prévu</th>
          <th>Référence</th>
          <th>Description du besoin</th>
          <th>Tracking</th>
        </tr>
      </thead>
      <tbody id="resultsTableau">
        <!-- Les lignes seront ajoutées dynamiquement par JS -->
      </tbody>
    </table>
  </div>

</div>

<!------Liaison à JS à la fin parce que sinon JS connaitra pas toutes les variables------>

<script src="script.js"></script>
</body>



</html>
